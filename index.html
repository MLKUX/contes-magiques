<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contes Magiques</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:#FFD700; --purple:#6B21A8; --purple-light:#A855F7;
    --teal:#0D9488; --dark:#07071a; --card-bg:rgba(255,255,255,0.07);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Nunito',sans-serif;background:var(--dark);color:#F1F0FF;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(107,33,168,0.3) 0%,transparent 55%),radial-gradient(ellipse at 80% 80%,rgba(13,148,136,0.2) 0%,transparent 55%);pointer-events:none;z-index:0;}

  /* SETUP */
  #setup-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:100;background:radial-gradient(ellipse at center,#1a0a2e 0%,#07071a 100%);}
  .setup-box{background:rgba(255,255,255,0.06);border:1px solid rgba(255,215,0,0.2);border-radius:24px;padding:44px 36px;width:100%;max-width:460px;text-align:center;backdrop-filter:blur(20px);box-shadow:0 0 80px rgba(107,33,168,0.3);}
  .setup-emoji{font-size:52px;display:block;margin-bottom:14px;animation:float 3s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .setup-box h1{font-family:'Fredoka One',cursive;font-size:2rem;background:linear-gradient(135deg,#FFD700,#FF6B9D);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;}
  .setup-box p{color:rgba(255,255,255,0.55);font-size:0.9rem;margin-bottom:28px;line-height:1.5;}
  .setup-box label{display:block;text-align:left;font-size:0.78rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:rgba(255,215,0,0.8);margin-bottom:7px;}
  .setup-box input{width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:12px;padding:13px 16px;color:white;font-family:'Nunito',sans-serif;font-size:0.9rem;margin-bottom:20px;outline:none;transition:border-color 0.2s;}
  .setup-box input:focus{border-color:rgba(255,215,0,0.5);}
  .setup-box input::placeholder{color:rgba(255,255,255,0.25);}
  .btn-start{width:100%;background:linear-gradient(135deg,#FFD700,#FF6B35);border:none;border-radius:14px;padding:15px;font-family:'Fredoka One',cursive;font-size:1.15rem;color:#1a0a2e;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 4px 24px rgba(255,215,0,0.3);}
  .btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,215,0,0.45);}
  #setup-error{color:#FF6B6B;font-size:0.82rem;font-weight:700;margin-top:12px;min-height:20px;}

  /* LIBRARY */
  #app{display:none;position:relative;z-index:1;min-height:100vh;}
  #library-screen{padding:28px 20px;max-width:920px;margin:0 auto;}
  .library-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;}
  .library-header h1{font-family:'Fredoka One',cursive;font-size:1.85rem;background:linear-gradient(135deg,#FFD700,#FF6B9D);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--purple-light),var(--teal));display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:1rem;border:2px solid rgba(255,215,0,0.4);}
  .level-tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
  .level-tab{padding:7px 18px;border-radius:999px;border:1px solid rgba(255,255,255,0.14);background:transparent;color:rgba(255,255,255,0.45);font-family:'Nunito',sans-serif;font-weight:700;font-size:0.82rem;cursor:pointer;transition:all 0.2s;}
  .level-tab.active{background:linear-gradient(135deg,#6B21A8,#A855F7);border-color:transparent;color:white;box-shadow:0 2px 16px rgba(168,85,247,0.4);}
  .stories-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:18px;}
  .story-card{background:var(--card-bg);border:1px solid rgba(255,255,255,0.08);border-radius:20px;overflow:hidden;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;}
  .story-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(107,33,168,0.35);border-color:rgba(255,215,0,0.25);}
  .story-thumb{width:100%;height:155px;display:flex;align-items:center;justify-content:center;font-size:50px;position:relative;overflow:hidden;}
  .story-thumb-forest{background:linear-gradient(160deg,#1a3a1a,#2d5a1b,#0a2a0a);}
  .story-thumb-ocean{background:linear-gradient(160deg,#0a1a3a,#1b3d5a,#0a2040);}
  .story-thumb-castle{background:linear-gradient(160deg,#3a1a0a,#5a3010,#2a0a05);}
  .story-thumb::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.4) 100%);}
  .story-info{padding:14px 16px 18px;}
  .story-level{display:inline-block;font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;padding:3px 9px;border-radius:999px;margin-bottom:7px;}
  .level-eveil{background:rgba(255,192,203,0.2);color:#FFB6C1;border:1px solid rgba(255,182,193,0.3);}
  .level-explorateur{background:rgba(255,215,0,0.15);color:#FFD700;border:1px solid rgba(255,215,0,0.3);}
  .level-aventurier{background:rgba(168,85,247,0.2);color:#C084FC;border:1px solid rgba(192,132,252,0.3);}
  .story-title{font-family:'Fredoka One',cursive;font-size:1.1rem;color:white;margin-bottom:5px;}
  .story-desc{font-size:0.8rem;color:rgba(255,255,255,0.5);line-height:1.5;}

  /* STORY SCREEN */
  #story-screen{display:none;position:fixed;inset:0;z-index:50;overflow:hidden;}

  /* SVG illustration fills entire screen */
  #story-svg-bg{position:absolute;inset:0;width:100%;height:100%;transition:opacity 0.5s;}
  #story-svg-bg svg{width:100%;height:100%;object-fit:cover;}

  /* Bottom gradient for text readability */
  .story-gradient{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.1) 0%,transparent 30%,transparent 50%,rgba(0,0,0,0.75) 80%,rgba(0,0,0,0.92) 100%);pointer-events:none;}

  /* Back button + progress */
  .story-back-btn{position:absolute;top:18px;left:18px;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.2);color:white;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:background 0.2s;z-index:10;}
  .story-back-btn:hover{background:rgba(255,255,255,0.15);}
  .story-progress{position:absolute;top:22px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:10;}
  .progress-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.3);transition:all 0.3s;}
  .progress-dot.done{background:#FFD700;}
  .progress-dot.current{background:white;transform:scale(1.3);}

  /* HOTSPOT choices — positioned absolutely on image */
  .hotspot{
    position:absolute;
    z-index:20;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(14px);
    border:1.5px solid rgba(255,255,255,0.35);
    border-radius:999px;
    padding:9px 16px 9px 10px;
    display:flex;align-items:center;gap:8px;
    cursor:pointer;
    font-family:'Nunito',sans-serif;font-weight:800;font-size:0.82rem;
    color:white;white-space:nowrap;
    transition:all 0.25s;
    box-shadow:0 4px 20px rgba(0,0,0,0.4);
    animation:hotspot-in 0.4s ease both;
  }
  .hotspot:hover{background:rgba(255,215,0,0.25);border-color:rgba(255,215,0,0.7);transform:scale(1.06);box-shadow:0 6px 28px rgba(255,215,0,0.3);}
  .hotspot:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
  @keyframes hotspot-in{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
  .hotspot-icon{width:24px;height:24px;border-radius:50%;background:rgba(255,215,0,0.3);border:1px solid rgba(255,215,0,0.6);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:900;color:#FFD700;flex-shrink:0;}

  /* Pulse dot on hotspot */
  .hotspot::before{content:'';position:absolute;inset:-4px;border-radius:999px;border:2px solid rgba(255,215,0,0.4);animation:hotspot-pulse 2s ease-in-out infinite;pointer-events:none;}
  @keyframes hotspot-pulse{0%,100%{opacity:0;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}

  /* Narration bar at bottom */
  .story-narration{
    position:absolute;bottom:0;left:0;right:0;
    padding:20px 24px 28px;
    z-index:10;
  }
  .story-text-box{
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:16px;padding:16px 20px;
  }
  .story-text{font-size:0.95rem;font-weight:600;line-height:1.65;color:rgba(255,255,255,0.92);}

  /* END SCREEN */
  .end-overlay{display:none;position:absolute;inset:0;z-index:30;flex-direction:column;align-items:center;justify-content:flex-end;text-align:center;padding-bottom:40px;}
  .end-overlay.show{display:flex;animation:end-in 0.6s ease both;}
  @keyframes end-in{from{opacity:0}to{opacity:1}}
  .end-illustration{position:absolute;inset:0;width:100%;height:100%;z-index:0;overflow:hidden;}
  .end-illustration svg{width:100%;height:100%;}
  .end-gradient{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 25%,rgba(0,0,0,0.9) 100%);z-index:1;pointer-events:none;}
  .end-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%;max-width:420px;padding:0 24px;}
  .end-star{font-size:56px;animation:float 2s ease-in-out infinite;margin-bottom:10px;filter:drop-shadow(0 0 20px rgba(255,215,0,0.8));}
  .end-title{font-family:'Fredoka One',cursive;font-size:2.2rem;background:linear-gradient(135deg,#FFD700,#FF6B9D);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;}
  .end-text{color:rgba(255,255,255,0.92);font-size:1rem;line-height:1.65;margin-bottom:24px;max-width:340px;text-shadow:0 1px 6px rgba(0,0,0,0.9);}
  .btn-replay{background:linear-gradient(135deg,#FFD700,#FF6B35);border:none;border-radius:13px;padding:13px 28px;font-family:'Fredoka One',cursive;font-size:1.05rem;color:#1a0a2e;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 4px 20px rgba(255,215,0,0.4);margin-bottom:10px;display:block;width:100%;max-width:260px;}
  .btn-replay:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,215,0,0.55);}
  .btn-library{background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.3);border-radius:13px;padding:11px 24px;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.88rem;color:rgba(255,255,255,0.8);cursor:pointer;transition:all 0.2s;display:block;width:100%;max-width:260px;backdrop-filter:blur(8px);}
  .btn-library:hover{border-color:rgba(255,255,255,0.6);color:white;}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup-screen">
  <div class="setup-box">
    <span class="setup-emoji">✨</span>
    <h1>Contes Magiques</h1>
    <p>Entre ton prénom pour commencer l'aventure !</p>
    <label>Ton prénom</label>
    <input type="text" id="name-input" placeholder="Ex : Léo" maxlength="20"/>
    <button class="btn-start" onclick="startApp()">Commencer l'aventure 🚀</button>
    <div id="setup-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="library-screen">
    <div class="library-header">
      <h1>✨ Contes Magiques</h1>
      <div class="avatar" id="user-avatar">?</div>
    </div>
    <div class="level-tabs">
      <button class="level-tab active" onclick="filterLevel('all',this)">Tous</button>
      <button class="level-tab" onclick="filterLevel('eveil',this)">🌸 Éveil (3-5 ans)</button>
      <button class="level-tab" onclick="filterLevel('explorateur',this)">⭐ Explorateur (6-8 ans)</button>
      <button class="level-tab" onclick="filterLevel('aventurier',this)">⚔️ Aventurier (9-12 ans)</button>
    </div>
    <div class="stories-grid" id="stories-grid"></div>
  </div>

  <div id="story-screen">
    <div id="story-svg-bg"></div>
    <div class="story-gradient"></div>
    <button class="story-back-btn" onclick="closeStory()">←</button>
    <div class="story-progress" id="story-progress"></div>
    <!-- Hotspots injected here dynamically -->
    <div id="hotspots-layer"></div>
    <div class="story-narration">
      <div class="story-text-box">
        <div class="story-text" id="story-text">…</div>
      </div>
    </div>
    <div class="end-overlay" id="end-overlay">
      <div class="end-illustration" id="end-illustration"></div>
      <div class="end-gradient"></div>
      <div class="end-content">
        <div class="end-star"  id="end-star">⭐</div>
        <div class="end-title" id="end-title">Bravo !</div>
        <div class="end-text"  id="end-text"></div>
        <button class="btn-replay"  onclick="replayStory()">🔄 Rejouer</button>
        <button class="btn-library" onclick="closeStory()">📚 Autre histoire</button>
      </div>
    </div>
  </div>
</div>

<!-- PREMIUM MODAL -->
<div id="premium-modal">
  <div class="premium-box">
    <span class="lock-icon">🔒</span>
    <h2>Contenu Premium</h2>
    <p>Les histoires <strong>Aventurier</strong> sont réservées aux abonnés.<br>Des récits plus profonds, des choix plus complexes, pour les grands explorateurs.</p>
    <button class="btn-subscribe" onclick="closePremiumModal()">✨ Découvrir l'abonnement</button>
    <button class="btn-cancel" onclick="closePremiumModal()">Pas maintenant</button>
  </div>
</div>

// STATE
// ═══════════════════════════════════
let userName='', currentStory=null, currentSceneId=null, visitedScenes=[], currentFilter='all', imageCache={};

// ═══════════════════════════════════
// SETUP
// ═══════════════════════════════════
function showPremiumModal(){
  document.getElementById('premium-modal').classList.add('show');
}
function closePremiumModal(){
  document.getElementById('premium-modal').classList.remove('show');
}

function startApp(){
  const name=document.getElementById('name-input').value.trim();
  const err=document.getElementById('setup-error');
  if(!name){err.textContent='Entre ton prénom pour commencer !';return;}
  err.textContent='';
  userName=name;
  document.getElementById('user-avatar').textContent=name[0].toUpperCase();
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('app').style.display='block';
  renderLibrary();
}
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')startApp();});

// ═══════════════════════════════════
// LIBRARY
// ═══════════════════════════════════
function renderLibrary(){
  const filtered=currentFilter==='all'?STORIES:STORIES.filter(s=>s.level===currentFilter);
  document.getElementById('stories-grid').innerHTML=filtered.map(s=>`
    <div class="story-card" onclick="openStory('${s.id}')">
      <div class="story-thumb ${s.thumb}"><span style="position:relative;z-index:1;font-size:50px;">${s.emoji}</span></div>
      <div class="story-info">
        <span class="story-level level-${s.level}">${levelLabel(s.level)}</span>
        <div class="story-title">${s.title}</div>
        <div class="story-desc">${s.desc}</div>
      </div>
    </div>`).join('');
}
function levelLabel(l){return l==='eveil'?'🌸 Éveil':l==='explorateur'?'⭐ Explorateur':'⚔️ Aventurier';}
function filterLevel(level,btn){
  currentFilter=level;
  document.querySelectorAll('.level-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderLibrary();
}

// ═══════════════════════════════════
// STORY
// ═══════════════════════════════════
function openStory(storyId){
  currentStory=STORIES.find(s=>s.id===storyId);
  currentSceneId=currentStory.scenes[0].id;
  visitedScenes=[];
  document.getElementById('library-screen').style.display='none';
  document.getElementById('story-screen').style.display='block';
  document.getElementById('end-overlay').classList.remove('show');
  renderScene(currentSceneId);
}
function closeStory(){
  document.getElementById('story-screen').style.display='none';
  document.getElementById('library-screen').style.display='block';
}
function replayStory(){
  document.getElementById('end-overlay').classList.remove('show');
  openStory(currentStory.id);
}

function renderScene(sceneId){
  const scene=currentStory.scenes.find(s=>s.id===sceneId);
  if(!scene)return;
  currentSceneId=sceneId;
  if(!visitedScenes.includes(sceneId))visitedScenes.push(sceneId);

  // Progress
  const prog=document.getElementById('story-progress');
  prog.innerHTML=visitedScenes.map((_,i)=>{
    const cls=i<visitedScenes.length-1?'done':'current';
    return `<div class="progress-dot ${cls}"></div>`;
  }).join('');

  // SVG background — instant placeholder
  const svgKey=currentStory.id+'/'+sceneId;
  const svgBg=document.getElementById('story-svg-bg');
  svgBg.style.opacity='1';
  if(SCENES_SVG[svgKey]){
    svgBg.innerHTML=SCENES_SVG[svgKey];
  } else {
    svgBg.innerHTML=`<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
      <defs><radialGradient id="fb" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#1a1a3a"/><stop offset="100%" stop-color="#07071a"/></radialGradient></defs>
      <rect width="1200" height="700" fill="url(#fb)"/>
      <text x="600" y="360" text-anchor="middle" font-size="80" opacity="0.4">${currentStory.emoji}</text>
    </svg>`;
  }

  // DALL-E 3 — via Vercel serverless proxy (avoids CORS & hides API key)
  if(scene.imageDesc){
    const cacheKey=currentStory.id+'/'+sceneId+'/dalle';
    if(imageCache[cacheKey]){
      svgBg.innerHTML='';
      svgBg.style.backgroundImage=`url(${imageCache[cacheKey]})`;
      svgBg.style.backgroundSize='cover';
      svgBg.style.backgroundPosition='center';
    } else {
      fetch('/api/generate-image',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({prompt:scene.imageDesc})
      }).then(r=>r.json()).then(data=>{
        const url=data?.url;
        if(url && currentSceneId===sceneId){
          imageCache[cacheKey]=url;
          svgBg.style.transition='opacity 0.8s';
          svgBg.style.opacity='0';
          setTimeout(()=>{
            svgBg.innerHTML='';
            svgBg.style.backgroundImage=`url(${url})`;
            svgBg.style.backgroundSize='cover';
            svgBg.style.backgroundPosition='center';
            svgBg.style.opacity='1';
          },800);
        }
      }).catch(()=>{});
    }
  }

  // Narration text
  document.getElementById('story-text').innerHTML=scene.text.split('\n').filter(l=>l.trim()).map(l=>`<span style="display:block;margin-bottom:4px;">${l}</span>`).join('');

  // Hotspot choices on image
  const hl=document.getElementById('hotspots-layer');
  hl.innerHTML='';
  if(scene.choices.length>0){
    scene.choices.forEach((c,i)=>{
      const btn=document.createElement('button');
      btn.className='hotspot';
      btn.style.left=c.pos.left;
      btn.style.top=c.pos.top;
      btn.style.animationDelay=(i*0.12)+'s';
      btn.innerHTML=`<span class="hotspot-icon">${String.fromCharCode(65+i)}</span>${c.text}`;
      btn.onclick=()=>makeChoice(c.next);
      hl.appendChild(btn);
    });
  }

  // End
  if(scene.end) setTimeout(()=>showEnd(scene.end),800);
}

function makeChoice(nextId){
  document.querySelectorAll('.hotspot').forEach(b=>{b.disabled=true;b.style.opacity='0.4';});
  setTimeout(()=>renderScene(nextId),300);
}

function showEnd(end){
  document.getElementById('end-star').textContent=end.star;
  document.getElementById('end-title').textContent=end.title;
  document.getElementById('end-text').innerHTML=end.text.split('\n').filter(l=>l.trim()).map(l=>`<span style="display:block;margin-bottom:6px;">${l}</span>`).join('');
  const illus=document.getElementById('end-illustration');
  illus.innerHTML=END_ILLUSTRATIONS[end.star]||END_ILLUSTRATIONS['default'];
  document.getElementById('end-overlay').classList.add('show');
}
